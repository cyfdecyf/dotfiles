# Selenized Dark 配色
set -g status-bg '#252525'       # 状态栏背景
set -g status-fg '#f0e9d7'       # 状态栏文字主色
# 左侧状态栏（主机名）
set -g status-left "#[fg=#ff8080][ #[fg=#70c000]#H #[fg=#ff8080]]#[default]"
set -g status-left-length 20
# 右侧状态栏（时间 + 日期）
set -g status-right-length 25
set -g status-right "#[fg=#ff8080][ #[fg=#70c000]%H:%M #[fg=#d0a0f0]%a %m-%d #[fg=#ff8080]] #[default]"
# 普通窗口样式
setw -g window-status-format '#[fg=#60a0ff,bold]#I: #W#F#[default]'
# 当前激活窗口样式
setw -g window-status-current-format '#[fg=#ffcc00,bold]#I: #W#F#[default] '

# default window for session cmd
new-session -s cmd
new-window -d -t cmd:
new-window -d -t cmd:
new-window -d -t cmd:
new-window -d -t cmd:
