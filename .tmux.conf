# avoid starting shell as login shell
set -g default-command /bin/zsh
#set -s escape-time 0
# Fix for WSL.
set -g escape-time 50

set -g base-index 1

# set prefix to `
unbind-key C-b
set-option -g prefix `
# press ` for 2 times to get `
bind ` send-prefix
# use ; for command prompt
unbind :
unbind \;
bind \; command-prompt

# screen like binding
unbind x
bind k confirm-before kill-pane

unbind [
bind Escape copy-mode

setw -g mode-keys vi
setw -g xterm-keys on
unbind %
bind _ split-window -v
bind | split-window -h
# update "terminal window" title
set-option -g set-titles on
# I rely on zsh to rename window title
setw -g automatic-rename off
set-option -g allow-rename on

set-option -g visual-activity on
setw -g monitor-activity on

# prevent application like less, vim clear screen after exit
set-window-option -g alternate-screen off
# Set to on because atuin need this.
#set-window-option -g alternate-screen on

#setw -g utf8 on
#set -g terminal-overrides "*88col*:colors=88,*256col*:colors=256,xterm*:colors=256"
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
#set -g default-terminal "xterm"
#set -g status-utf8 on
set -g status-justify centre

